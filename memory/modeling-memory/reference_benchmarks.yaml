# SWMM-expert reference benchmarks (PRD-06 Phase A.2)
#
# Curated thresholds and parameter ranges the agent uses to classify
# .rpt outputs as PASS / WARN / FAIL and to surface citations for
# parameter choices. This file is hand-editable — values come from
# the literature (citation key at the leaf where relevant) or from
# the modeler's own project history.
#
# Schema is hierarchical / dotted. Look up via
# ``recall_reference_benchmark(path, "continuity_thresholds_pct.runoff.warn")``.
#
# Empty leaves are allowed; the loader is tolerant of missing keys
# and consumers pass a numeric default to ``recall_reference_benchmark``.

schema_version: "1.0"

# ---------------------------------------------------------------------------
# Goodness-of-fit thresholds for calibrated runs. NSE = Nash-Sutcliffe.
# Use case keys match ``model_structure.use_case`` in parametric_memory.
# ---------------------------------------------------------------------------
nse_acceptable_thresholds:
  stormwater_event:
    acceptable: 0.5
    good: 0.65
    excellent: 0.75
  stormwater_continuous:
    acceptable: 0.5
    good: 0.7
    excellent: 0.8
  baseflow_low_flow:
    acceptable: 0.4
    good: 0.6
    excellent: 0.75

# ---------------------------------------------------------------------------
# Continuity error thresholds read from the .rpt by postflight_qa.
# WARN bumps the run to a manual-review state; FAIL gates downstream
# acceptance entirely. Magnitudes — see classify_metric() semantics.
# ---------------------------------------------------------------------------
continuity_thresholds_pct:
  runoff:
    warn: 5.0
    fail: 10.0
  flow:
    warn: 1.0
    fail: 5.0
  mass_balance:
    warn: 2.0
    fail: 5.0

# ---------------------------------------------------------------------------
# Manning's n for overland flow (SWMM SUBCATCHMENT N-IMPERV / N-PERV).
# All ranges per Huber & Dickinson (1988) Table 4-5 — see citations.yaml
# (Phase B). Phase A ships the citation key inline so the leaf is
# self-describing pending the dedicated citations module.
# ---------------------------------------------------------------------------
manning_n_overland:
  asphalt:
    min: 0.010
    typical: 0.012
    max: 0.014
    citation: "huber_dickinson_1988_t4-5"
  concrete:
    min: 0.011
    typical: 0.013
    max: 0.015
    citation: "huber_dickinson_1988_t4-5"
  grass_short:
    min: 0.10
    typical: 0.15
    max: 0.20
    citation: "huber_dickinson_1988_t4-5"

# ---------------------------------------------------------------------------
# Manning's n for closed-conduit roughness (SWMM CONDUIT ROUGHNESS).
# ---------------------------------------------------------------------------
manning_n_pipes:
  concrete_smooth:
    min: 0.011
    typical: 0.013
    max: 0.015
  hdpe:
    min: 0.009
    typical: 0.011
    max: 0.013
