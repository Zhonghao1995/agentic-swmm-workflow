# ===========================================================================
# WARNING — UN-CITED PLACEHOLDERS
# ---------------------------------------------------------------------------
# Most numeric leaves in this file are deliberately ``null``. Each null leaf
# has a sibling ``citation`` key pointing into ``citations.yaml`` (also under
# this directory). A numeric leaf lands ONLY AFTER the matching citation
# entry has been verified by the maintainer (``verified_by`` and
# ``verified_on`` populated) — schema-only placeholder entries are not
# sufficient. See ``agentic_swmm/memory/citations.py`` for the typed reader.
#
# Two consequences for runtime:
#  * ``classify_metric`` returns ``"UNKNOWN"`` for any metric whose threshold
#    leaf is ``null`` (see agentic_swmm/memory/reference_benchmarks.py).
#  * ``recall_reference_benchmark(path, dotted_key, default)`` always returns
#    the caller's ``default`` for a ``null`` leaf — callers must pass a
#    safe-conservative numeric default.
#
# The only block that ships with concrete numbers is
# ``continuity_thresholds_pct`` — those are the SWMM User Manual's own
# magnitude bands for the runoff / flow / mass-balance continuity printout,
# not a literature recall. A later phase will move them under a citation
# key too, for consistency.
# ===========================================================================

schema_version: "1.0"

# ---------------------------------------------------------------------------
# Goodness-of-fit thresholds for calibrated runs. NSE = Nash-Sutcliffe.
# Use case keys match ``model_structure.use_case`` in parametric_memory.
#
# Leaves are intentionally ``null`` — populate from the project's
# citation library in Phase B (Moriasi-class watershed-modeling guidance
# for streamflow; stormwater-event guidance is separate literature).
# ---------------------------------------------------------------------------
nse_acceptable_thresholds:
  stormwater_event:
    acceptable: null
    good: null
    excellent: null
    citation: null  # lands when matching citations.yaml entry is verified
  stormwater_continuous:
    acceptable: null
    good: null
    excellent: null
    citation: null  # lands when matching citations.yaml entry is verified
  baseflow_low_flow:
    acceptable: null
    good: null
    excellent: null
    citation: null  # lands when matching citations.yaml entry is verified

# ---------------------------------------------------------------------------
# Continuity error thresholds read from the .rpt by postflight_qa.
# WARN bumps the run to manual review; FAIL gates downstream acceptance.
# Magnitudes — see classify_metric() semantics.
#
# These bands track the SWMM User Manual's own continuity-error printout
# convention (small percentages indicate a numerically sound run; double-digit
# percentages indicate the simulation has gone off the rails). Treat them as
# the project's *default* gate; project-local overrides should pass an
# explicit ``benchmarks_path`` to ``postflight_qa``.
# ---------------------------------------------------------------------------
continuity_thresholds_pct:
  runoff:
    warn: 5.0
    fail: 10.0
  flow:
    warn: 1.0
    fail: 5.0
  mass_balance:
    warn: 2.0
    fail: 5.0

