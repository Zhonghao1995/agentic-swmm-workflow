name: CI

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "requirements.txt"
      - "agentic_swmm/**"
      - "scripts/**"
      - "skills/**"
      - "examples/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "requirements.txt"
      - "agentic_swmm/**"
      - "scripts/**"
      - "skills/**"
      - "examples/**"
      - "tests/**"

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage[toml]
          pip install -r requirements.txt
          pip install -e .

      - name: Syntax check
        run: |
          git ls-files '*.py' | xargs python -m py_compile

      - name: Unit tests
        run: |
          coverage run --source=agentic_swmm,skills -m unittest discover -s skills/swmm-uncertainty/tests -v
          coverage run --append --source=agentic_swmm,skills -m unittest discover -s tests -v
          coverage xml
          coverage report --show-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build Python package
        run: |
          python -m pip install build
          python -m build

      - name: Fuzzy uncertainty dry run
        run: |
          python skills/swmm-uncertainty/scripts/uncertainty_propagate.py \
            --base-inp examples/todcreek/model_chicago5min.inp \
            --patch-map examples/calibration/patch_map.json \
            --fuzzy-space skills/swmm-uncertainty/examples/fuzzy_space.json \
            --config skills/swmm-uncertainty/examples/uncertainty_config.json \
            --run-root runs/ci-uncertainty \
            --summary-json runs/ci-uncertainty/uncertainty_summary.json \
            --dry-run

  acceptance-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install SWMM engine
        run: |
          scripts/install.sh --yes --skip-python --skip-mcp
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run acceptance workflow
        run: |
          python scripts/acceptance/run_acceptance.py --run-id ci-audit

      - name: Generate audit record
        run: |
          python skills/swmm-experiment-audit/scripts/audit_run.py \
            --run-dir runs/acceptance/ci-audit \
            --no-obsidian

      - name: Verify audit outputs
        run: |
          test -f runs/acceptance/ci-audit/experiment_provenance.json
          test -f runs/acceptance/ci-audit/comparison.json
          test -f runs/acceptance/ci-audit/experiment_note.md
