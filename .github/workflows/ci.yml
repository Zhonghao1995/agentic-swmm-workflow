name: CI

on:
  push:
    paths:
      - ".github/workflows/ci.yml"
      - "requirements.txt"
      - "scripts/**"
      - "skills/**"
      - "examples/**"
      - "tests/**"
      - "mcp/**"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "requirements.txt"
      - "scripts/**"
      - "skills/**"
      - "examples/**"
      - "tests/**"
      - "mcp/**"

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install MCP server dependencies
        run: bash scripts/install_mcp_deps.sh

      - name: Cache SWMM 5 binary
        id: cache-swmm5
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/swmm5
          key: swmm5-v5.2.4-${{ runner.os }}

      - name: Build SWMM 5 from source
        if: steps.cache-swmm5.outputs.cache-hit != 'true'
        run: |
          set -e
          git clone --depth 1 --branch v5.2.4 \
            https://github.com/USEPA/Stormwater-Management-Model.git /tmp/swmm5-src
          cmake -S /tmp/swmm5-src -B /tmp/swmm5-build \
            -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/swmm5-build --config Release -j"$(nproc)"
          SWMM_BIN=$(find /tmp/swmm5-build \
            \( -name 'runswmm' -o -name 'swmm5' \) \
            -type f -executable | head -1)
          if [ -z "$SWMM_BIN" ]; then
            echo "::error::Could not locate SWMM 5 binary after build"
            find /tmp/swmm5-build -type f -executable
            exit 1
          fi
          mkdir -p "$HOME/.local/bin"
          cp "$SWMM_BIN" "$HOME/.local/bin/swmm5"
          chmod +x "$HOME/.local/bin/swmm5"

      - name: Verify SWMM 5 on PATH
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/swmm5" --version

      - name: Syntax check
        run: |
          git ls-files '*.py' | xargs python -m py_compile

      - name: Unit tests
        run: |
          python -m unittest discover -s skills/swmm-uncertainty/tests -v
          python -m pytest tests/ -v

      - name: Fuzzy uncertainty dry run
        run: |
          python skills/swmm-uncertainty/scripts/uncertainty_propagate.py \
            --base-inp examples/todcreek/model_chicago5min.inp \
            --patch-map examples/calibration/patch_map.json \
            --fuzzy-space skills/swmm-uncertainty/examples/fuzzy_space.json \
            --config skills/swmm-uncertainty/examples/uncertainty_config.json \
            --run-root runs/ci-uncertainty \
            --summary-json runs/ci-uncertainty/uncertainty_summary.json \
            --dry-run

  acceptance-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache SWMM 5 binary
        id: cache-swmm5
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/swmm5
          key: swmm5-v5.2.4-${{ runner.os }}

      - name: Build SWMM 5 from source
        if: steps.cache-swmm5.outputs.cache-hit != 'true'
        run: |
          set -e
          git clone --depth 1 --branch v5.2.4 \
            https://github.com/USEPA/Stormwater-Management-Model.git /tmp/swmm5-src
          cmake -S /tmp/swmm5-src -B /tmp/swmm5-build \
            -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/swmm5-build --config Release -j"$(nproc)"
          SWMM_BIN=$(find /tmp/swmm5-build \
            \( -name 'runswmm' -o -name 'swmm5' \) \
            -type f -executable | head -1)
          if [ -z "$SWMM_BIN" ]; then
            echo "::error::Could not locate SWMM 5 binary after build"
            find /tmp/swmm5-build -type f -executable
            exit 1
          fi
          mkdir -p "$HOME/.local/bin"
          cp "$SWMM_BIN" "$HOME/.local/bin/swmm5"
          chmod +x "$HOME/.local/bin/swmm5"

      - name: Verify SWMM 5 on PATH
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/swmm5" --version

      - name: Run acceptance workflow
        run: |
          python scripts/acceptance/run_acceptance.py --run-id ci-audit

      - name: Generate audit record
        run: |
          python skills/swmm-experiment-audit/scripts/audit_run.py \
            --run-dir runs/acceptance/ci-audit \
            --no-obsidian

      - name: Verify audit outputs
        run: |
          test -f runs/acceptance/ci-audit/09_audit/experiment_provenance.json
          test -f runs/acceptance/ci-audit/09_audit/comparison.json
          test -f runs/acceptance/ci-audit/09_audit/experiment_note.md
          test -f runs/acceptance/ci-audit/09_audit/model_diagnostics.json

      - name: Refresh modeling memory
        run: |
          python skills/swmm-modeling-memory/scripts/summarize_memory.py \
            --runs-dir runs \
            --out-dir memory/modeling-memory
          test -f runs/acceptance/ci-audit/memory_summary.json
          test -f memory/modeling-memory/project_memory_index.md
