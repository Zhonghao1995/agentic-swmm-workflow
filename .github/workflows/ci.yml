name: CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          git ls-files '*.py' | xargs python -m py_compile

      - name: Unit tests
        run: |
          python -m unittest discover -s skills/swmm-uncertainty/tests -v

      - name: Fuzzy uncertainty dry run
        run: |
          python skills/swmm-uncertainty/scripts/uncertainty_propagate.py \
            --base-inp examples/todcreek/model_chicago5min.inp \
            --patch-map examples/calibration/patch_map.json \
            --fuzzy-space skills/swmm-uncertainty/examples/fuzzy_space.json \
            --config skills/swmm-uncertainty/examples/uncertainty_config.json \
            --run-root runs/ci-uncertainty \
            --summary-json runs/ci-uncertainty/uncertainty_summary.json \
            --dry-run
