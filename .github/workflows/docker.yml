name: Docker

on:
  # Auto-build and push the multi-arch image whenever a release tag is
  # pushed (e.g. v0.6.4 or v0.6.4a1). This guarantees that every Git tag
  # named "v*" has a matching ghcr.io image with the same name, so the
  # SHA-256 byte-reproducibility claims in the Agentic SWMM paper stay
  # consistent between the tag and the published container image.
  push:
    tags:
      - "v*"
  # Manual dispatch is preserved for ad-hoc image rebuilds of a specific
  # Git ref (e.g. rebuilding a tag against a refreshed base image) and
  # for backfilling images for older tags.
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Agentic SWMM Git ref to package into the image"
        required: true
        default: "v0.6.4"
      image_tag:
        description: "Optional image tag override"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Docker packaging files
        uses: actions/checkout@v4

      - name: Resolve source ref
        id: source
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            source_ref="${{ inputs.source_ref }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            source_ref="${GITHUB_REF_NAME}"
          else
            source_ref="${GITHUB_SHA}"
          fi
          echo "ref=$source_ref" >> "$GITHUB_OUTPUT"

      - name: Resolve target registries
        id: registries
        shell: bash
        env:
          # Presence of this secret is the opt-in switch for the Docker Hub
          # mirror. It is needed to actually push, so gating on it (rather than
          # on the username) guarantees we never emit a docker.io tag we cannot
          # authenticate for.
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # GHCR is the canonical registry and the provenance reference baked
          # into the image (AISWMM_CONTAINER_IMAGE). We additionally mirror to
          # Docker Hub when DOCKERHUB_TOKEN is configured, purely so pull-count
          # telemetry has a home: GHCR exposes no pull counts, Docker Hub does.
          # With no secret set this workflow behaves exactly as before (GHCR
          # only), and forks / PRs never attempt a mirror they cannot push.
          images="ghcr.io/zhonghao1995/agentic-swmm-workflow"
          dockerhub="false"
          if [[ -n "${DOCKERHUB_TOKEN}" ]]; then
            images="${images}"$'\n'"docker.io/zhonghao1995/agentic-swmm-workflow"
            dockerhub="true"
          fi
          echo "dockerhub=${dockerhub}" >> "$GITHUB_OUTPUT"
          {
            echo "images<<EOF"
            echo "${images}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'pull_request' && steps.registries.outputs.dockerhub == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registries.outputs.images }}
          tags: |
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}
            type=raw,value=${{ inputs.source_ref }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            AGENTIC_SWMM_REF=${{ steps.source.outputs.ref }}
            SWMM_REF=v5.2.4
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keep the Docker Hub landing page in lockstep with the repo README so
      # the mirror never drifts from GitHub. Runs after every successful push;
      # url-completion rewrites the README's relative image links (docs/figs/…)
      # to absolute GitHub URLs so they render on hub.docker.com.
      - name: Sync Docker Hub description from README
        if: ${{ github.event_name != 'pull_request' && steps.registries.outputs.dockerhub == 'true' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: zhonghao1995/agentic-swmm-workflow
          short-description: "Reproducible container for Agentic SWMM: AI-agent-driven, auditable SWMM stormwater modeling."
          readme-filepath: ./README.md
          enable-url-completion: true
