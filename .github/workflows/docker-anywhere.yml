name: Docker (anywhere variant)

# Supplementary "fat" image build. Unlike docker.yml (which auto-builds the
# thin image on every v* tag), this workflow is MANUAL-ONLY: it never runs on
# its own. Trigger it by hand when you want a `<tag>-anywhere` companion image
# that bundles the SWMManywhere [anywhere] extra on top of an already-published
# thin image. This keeps "does this release ship the anywhere variant?" an
# explicit, per-release decision rather than an automatic one.
#
# The image is built by layering Dockerfile.anywhere on the published thin
# image, so it inherits that image's swmm5 binary, pinned repo ref, and locked
# deps unchanged. CI pushes it with the built-in GITHUB_TOKEN, the same key
# that publishes every other image in this repo.

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Published thin image tag to extend (e.g. v0.7.1 or 0.7.1)"
        required: true
        default: "v0.7.1"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Docker packaging files
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          src="${{ inputs.source_tag }}"
          # Normalize: derive the bare version (no leading "v") for the base
          # image reference, then emit both bare and v-prefixed output tags so
          # the anywhere image mirrors the thin image's dual-tag convention.
          ver="${src#v}"
          base="ghcr.io/zhonghao1995/agentic-swmm-workflow:${ver}"
          echo "base_image=${base}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "ghcr.io/zhonghao1995/agentic-swmm-workflow:${ver}-anywhere"
            echo "ghcr.io/zhonghao1995/agentic-swmm-workflow:v${ver}-anywhere"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push anywhere image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.anywhere
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ steps.tags.outputs.base_image }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
