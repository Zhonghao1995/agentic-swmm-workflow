# Default report template for swmm-report.
# Each entry defines one section rendered into the Word deliverable.
# All visible prose strings are defined here (i18n: copy this file and translate to localise).
# The `id` values are a closed vocabulary defined in generate_report.py's SECTION_RENDERERS.
# `title` overrides the heading text; other keys are section-specific config.
#
# Engineering-report fields (added in feat/report-engineering-format):
#   caption   — table caption text rendered ABOVE each table as "Table N — <caption>".
#               The "Table N" prefix is bold; the rest is regular weight.
#   narrative — explanatory paragraph rendered IMMEDIATELY BELOW each table.
#               All prose must live in the template (i18n rule); never hardcode in Python.
#
# Section headings for body sections are automatically prefixed with sequential numbers
# (1 Run Summary, 2 Model Description, …) at generation time.  The cover title/subtitle
# are unnumbered.  Numbers are NOT stored here — they are assigned in template order.

sections:

  - id: cover
    title: "Run Audit Deliverable"
    subtitle: "Generated by aiswmm · swmm-report skill"
    # caption appears above the cover info table; narrative appears below it
    caption: "Run identification and generation metadata."
    narrative: >
      Run ID and timestamps are sourced directly from experiment_provenance.json; the SWMM
      version reflects the binary used during the simulation run.

  - id: run_summary
    title: "Run Summary"
    columns:
      - Metric
      - Value
      - Unit
    rows:
      - key: peak_flow
        label: "Peak flow at outfall"
        unit: "CMS"
      - key: time_of_peak
        label: "Time of peak"
        unit: "hh:mm"
      - key: continuity_error
        label: "Continuity error"
        unit: "%"
      - key: return_code
        label: "SWMM return code"
        unit: ""
    caption: "Key hydraulic performance metrics for this simulation run."
    narrative: >
      Values are read from the run manifest and experiment_provenance.json produced by the
      SWMM runner and audit tool; no metrics are recomputed at report generation time.

  - id: model_description
    title: "Model Description"
    columns:
      - Parameter
      - Value
    rows:
      - key: basin_area_ha
        label: "Basin area"
        unit: "ha"
      - key: sim_start
        label: "Simulation start"
        unit: ""
      - key: sim_end
        label: "Simulation end"
        unit: ""
      - key: imperv_pct
        label: "Impervious fraction"
        unit: "%"
      - key: ksat_mm_per_hr
        label: "Saturated hydraulic conductivity"
        unit: "mm/hr"
      - key: suction_mm
        label: "Green-Ampt suction head"
        unit: "mm"
    caption: "Catchment geometry and infiltration parameters from the model manifest."
    narrative: >
      All parameter values are sourced from manifest.json written by swmm-builder at
      model-construction time; they reflect the exact inputs used for this simulation.

  - id: qa_gates
    title: "QA Gates"
    columns:
      - Gate ID
      - Status
      - Detail
    pass_label: "PASS"
    fail_label: "FAIL"
    caption: "Automated QA gate results from the audit pipeline."
    narrative: >
      Each gate is evaluated by swmm-experiment-audit against thresholds defined in the
      project configuration; PASS/FAIL status is read from experiment_provenance.json and
      is not recomputed here.

  - id: figures
    title: "Figures"
    plot_dirs:
      - "07_plot"
      - "08_plot"
    include_root_png: "network_layout.png"
    no_figures_note: "No figures available for this run."
    # Figure captions are placed BELOW each figure (engineering convention) as "Figure N — <stem>".
    # No `caption` / `narrative` fields for the figures section — captions attach per-figure.

  - id: diagnostics
    title: "Model Diagnostics"
    columns:
      - Code
      - Severity
      - Message
    no_diagnostics_note: "No diagnostics reported."
    caption: "SWMM diagnostic messages emitted during the simulation run."
    narrative: >
      Diagnostic entries are parsed from model_diagnostics.json produced by
      swmm-experiment-audit; codes and severities follow the SWMM 5 output format.

  - id: comparison
    title: "Comparison with Baseline Run"
    columns:
      - Metric
      - Current
      - Baseline
      - Delta
    caption: "Side-by-side metric comparison between the current and baseline runs."
    narrative: >
      Current and baseline values are read from 09_audit/comparison.json generated by
      swmm-experiment-audit; delta is the arithmetic difference (current minus baseline)
      as stored in that file and is not recomputed here.

  - id: provenance
    title: "Artifact Provenance"
    columns:
      - Artifact ID
      - Role
      - SHA-256 (first 16 chars)
      - Produced by
    sha256_length: 16
    caption: "Cryptographic hashes and roles of artifacts involved in this run."
    narrative: >
      SHA-256 digests are computed by swmm-experiment-audit at audit time and stored in
      experiment_provenance.json; only the first 16 hex characters are shown here for
      readability — the full digest is available in the provenance JSON.

  - id: appendix
    title: "Appendix: Generation Environment"
    columns:
      - Item
      - Value
    caption: "Software environment at the time of audit generation."
    narrative: >
      All environment values are read from experiment_provenance.json; they capture the
      exact tool versions used to produce and audit the simulation results.
