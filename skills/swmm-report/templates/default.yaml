# Default report template for swmm-report.
# Each entry defines one section rendered into the Word deliverable.
# All visible prose strings are defined here (i18n: copy this file and translate to localise).
# The `id` values are a closed vocabulary defined in generate_report.py's SECTION_RENDERERS.
# `title` overrides the heading text; other keys are section-specific config.

sections:

  - id: cover
    title: "Run Audit Deliverable"
    subtitle: "Generated by aiswmm · swmm-report skill"

  - id: run_summary
    title: "Run Summary"
    columns:
      - Metric
      - Value
      - Unit
    rows:
      - key: peak_flow
        label: "Peak flow at outfall"
        unit: "CMS"
      - key: time_of_peak
        label: "Time of peak"
        unit: "hh:mm"
      - key: continuity_error
        label: "Continuity error"
        unit: "%"
      - key: return_code
        label: "SWMM return code"
        unit: ""

  - id: model_description
    title: "Model Description"
    columns:
      - Parameter
      - Value
    rows:
      - key: basin_area_ha
        label: "Basin area"
        unit: "ha"
      - key: sim_start
        label: "Simulation start"
        unit: ""
      - key: sim_end
        label: "Simulation end"
        unit: ""
      - key: imperv_pct
        label: "Impervious fraction"
        unit: "%"
      - key: ksat_mm_per_hr
        label: "Saturated hydraulic conductivity"
        unit: "mm/hr"
      - key: suction_mm
        label: "Green-Ampt suction head"
        unit: "mm"

  - id: qa_gates
    title: "QA Gates"
    columns:
      - Gate ID
      - Status
      - Detail
    pass_label: "PASS"
    fail_label: "FAIL"

  - id: figures
    title: "Figures"
    caption_prefix: "Figure"
    plot_dirs:
      - "07_plot"
      - "08_plot"
    include_root_png: "network_layout.png"
    no_figures_note: "No figures available for this run."

  - id: diagnostics
    title: "Model Diagnostics"
    columns:
      - Code
      - Severity
      - Message
    no_diagnostics_note: "No diagnostics reported."

  - id: comparison
    title: "Comparison with Baseline Run"
    columns:
      - Metric
      - Current
      - Baseline
      - Delta

  - id: provenance
    title: "Artifact Provenance"
    columns:
      - Artifact ID
      - Role
      - SHA-256 (first 16 chars)
      - Produced by
    sha256_length: 16

  - id: appendix
    title: "Appendix: Generation Environment"
    columns:
      - Item
      - Value
